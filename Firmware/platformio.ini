;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_metro_esp32s3]
platform = espressif32
board = adafruit_metro_esp32s3
framework = arduino
monitor_speed = 115200

lib_deps = 
    earlephilhower/ESP8266Audio@^2.4.1 ; Audio
    madhephaestus/ESP32Servo@^3.2.0      ; Servo moteur
    adafruit/Adafruit AHTX0@^2.0.6       ; AHT20
    adafruit/Adafruit VEML7700 Library@^2.1.6 ; VEML7700 luminosité
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2 ; MCP23017 le truc qui add des pins 
    bodmer/TFT_eSPI@^2.5.43 ; pour l'affichage écran
    paulstoffregen/XPT2046_Touchscreen ; pour le tactile 
    https://github.com/esp-arduino-libs/ESP32_Knob.git ;EC11
    esphome/ESP32-audioI2S@^2.3.0 ; audioV2


